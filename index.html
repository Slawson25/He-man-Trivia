<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <title>He-Man Trivia</title>
</head>

<body>
    <h1 class="game-title">HE-MAN TRIVIA</h1>

    <button id="startBtn" class="start-text">
        PRESS START TO BEGIN
    </button>

    <section id="gameArea" class="game-area">
        <h2 id="question"></h2>

        <div id="answers"></div>

        <p id="score">Score: 0</p>

    <figure>
  <iframe
    id="winVideo"
    class="result-video"
    data-src="https://www.youtube.com/embed/bkEfXxHwSjA?autoplay=1&mute=1"
    title="Win video"
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
    allowfullscreen>
  </iframe>
</figure>

<figure>
  <iframe
    id="loseVideo"
    class="result-video"
    data-src="https://www.youtube.com/embed/XESJGD0iwZY?autoplay=1&mute=1"
    title="Lose video"
    allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
    allowfullscreen>
  </iframe>
</figure>
    </section>



    <script src="script.js"></script>
</body>

</html>
